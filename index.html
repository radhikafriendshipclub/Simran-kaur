<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radhika Friendship Club</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/dist/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at top, #0d1b2a 0%, #010409 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        h1.main-title {
            color: #00ffcc;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 30px;
        }

        .profile-circle {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            border: 4px solid #00ffcc;
            margin: 0 auto 20px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.3);
        }

        .profile-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .name {
            font-size: 32px;
            font-weight: 800;
            color: #ffffff;
            margin: 10px 0;
        }

        .subtitle {
            color: #8b949e;
            font-size: 18px;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .divider {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px 0;
        }

        .divider::before, .divider::after {
            content: "";
            height: 1px;
            width: 50px;
            background-color: #00ffcc;
            margin: 0 10px;
        }

        .tagline {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .description {
            color: #8b949e;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .whatsapp-section{
text-align:center;
margin:40px 0;
}

.whatsapp-btn{
display:inline-flex;
align-items:center;
gap:10px;
background:linear-gradient(45deg,#25D366,#00b894);
color:#fff;
padding:16px 35px;
font-size:22px;
font-weight:600;
border-radius:40px;
text-decoration:none;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
transition:0.3s;
}

.whatsapp-btn img{
width:28px;
}

.whatsapp-btn:hover{
transform:scale(1.05);
}

        .stats-row {
            display: flex;
            justify-content: space-between;
            border-top: 1px solid #30363d;
            padding-top: 20px;
        }

        .stat-item {
            flex: 1;
        }

        .stat-number {
            color: #00ffcc;
            font-size: 24px;
            font-weight: bold;
            display: block;
        }

        .stat-label {
            color: #8b949e;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="main-title">Join Radhika Friendship Club</h1>

        <div class="profile-circle">
            <img src="https://i.postimg.cc/7Pp2W4dB/Radhika838.jpg" alt="Radhika">
        </div>

        <div class="name">DM FOR DETAILS</div>
        
        <div class="divider">
            <div class="subtitle">Trusted & verified</div>
        </div>

        <div class="tagline">Life is Boring Without Friends</div>
        
        <div class="description">
            Meeting with high profile medam near you
        </div>

        <div class="whatsapp-section">

<a href="https://wa.me/9165439048?text=Hello%20I%20want%20details" target="_blank" class="whatsapp-btn">
<img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
Whatsapp Now
</a>

</div>

        <div class="stats-row">
            <div class="stat-item">
                <span class="stat-number">8+</span>
                <span class="stat-label">Years<br>Experience</span>
            </div>
            <div class="stat-item">
                <span class="stat-number">50k+</span>
                <span class="stat-label">Happy<br>Members</span>
            </div>
            <div class="stat-item">
                <span class="stat-number">24/7</span>
                <span class="stat-label">Online<br>Support</span>
            </div>
        </div>
    </div>

</body>
</html>
